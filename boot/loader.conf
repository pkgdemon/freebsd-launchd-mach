# Live ISO boot config (init_chroot architecture, unionfs+tmpfs variant).
#
# The kernel mounts cd9660 as initial root. /sbin/init (real FreeBSD init
# binary, from base.txz) runs from cd9660, reads init_script kenv, and
# forks a child to run /init.sh. The script:
#   - vnode-mounts /rootfs.uzip via mdconfig (cd9660 stays mounted)
#   - mounts the read-only UFS at /sysroot
#   - mounts tmpfs at /upper (writable, RAM-scaled, no fixed size)
#   - mounts in-kernel unionfs combining them at /sysroot
#   - sets init_chroot=/sysroot and exits
# init then chroots into /sysroot and continues normal multi-user boot.
# cd9660 stays mounted as the kernel's actual root, hidden from the chroot.
# Only decompressed pages of rootfs.uzip live in RAM (page cache),
# not the entire compressed image.

# Modules used by /init.sh
geom_uzip_load="YES"
unionfs_load="YES"

# PID 1 selection. The kernel tries each colon-separated path in order:
#   /init.sh   — Option D: shebang #!/rescue/sh, /rescue/sh runs as PID 1
#                executing init.sh; init.sh does the unionfs pivot then
#                exec's /sbin/launchd via /rescue/chroot, handing PID 1
#                to launchd.
#   /rescue/init — fallback if /init.sh fails for any reason. /rescue/init
#                  uses init_script= below to invoke the same /init.sh as
#                  a child; /init.sh detects $$ != 1 and falls back to
#                  the kenv-init_chroot pivot (FreeBSD's normal init flow).
init_path="/init.sh:/rescue/init"

# Used only on the fallback path (kernel didn't fly /init.sh as PID 1).
# /rescue/init reads these and runs /init.sh as a child via init_script.
init_shell="/rescue/sh"
init_script="/init.sh"

# Initial root = cd9660 from the live media
vfs.root.mountfrom="cd9660:/dev/iso9660/LIVECD"

# Console: write to BOTH serial (comconsole) AND VGA framebuffer
# (vidconsole, backed by vt_efifb on UEFI / vt_vga on legacy BIOS).
# qemu's -serial stdio captures the serial side for our boot test;
# real hardware / VBox-VGA see the same kernel messages on the
# attached monitor.
boot_serial="YES"
console="comconsole vidconsole"
comconsole_speed="115200"
beastie_disable="YES"
autoboot_delay="2"

# nvidia-drm.ko reads this kenv tunable at kmod-init time. Setting 1
# enables the DRM/KMS hooks (Wayland-capable, modesetting on tty
# switch). Without it nvidia-drm loads in legacy mode — only the
# proprietary GLX path works, no DRM. Must be set BEFORE the kmod
# loads, which means here in /boot/loader.conf (read by /boot/loader
# before kernel start). Harmless on systems without Nvidia hardware
# since kmodloader won't load nvidia-drm unless it sees vendor=0x10de.
hw.nvidiadrm.modeset="1"
